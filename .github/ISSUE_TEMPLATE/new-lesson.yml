name: 새 레슨 제안
description: 새 알고리즘 레슨을 제안합니다.
title: "[New Lesson] "
labels: ["new-lesson", "discussion"]
body:
  - type: input
    id: lesson_id
    attributes:
      label: lessonId
      description: 소문자 영어와 하이픈을 사용해 주세요.
      placeholder: "예: zero-one-bfs"
    validations:
      required: true

  - type: input
    id: title
    attributes:
      label: 레슨 제목
      placeholder: "예: 0-1 BFS"
    validations:
      required: true

  - type: textarea
    id: why
    attributes:
      label: 왜 필요한가요?
      description: 이 레슨이 기존 목록에 추가되어야 하는 이유를 적어 주세요.
    validations:
      required: true

  - type: textarea
    id: prerequisites
    attributes:
      label: 선수 지식
      placeholder: "예: BFS, Dijkstra, deque"
    validations:
      required: true

  - type: textarea
    id: outline
    attributes:
      label: 포함하면 좋은 내용
      placeholder: |
        1. 일반 BFS와의 차이
        2. deque를 쓰는 이유
        3. 0 비용 간선은 push_front
        4. 1 비용 간선은 push_back
        5. Dijkstra와의 비교
    validations:
      required: true
