      <rect x="454" y="0" width="58" height="54" rx="6" fill="#dcfce7" stroke="#16a34a"/>
      <rect x="536" y="0" width="58" height="54" rx="6" fill="#fef3c7" stroke="#d97706"/>
      <rect x="598" y="0" width="58" height="54" rx="6" fill="#fef3c7" stroke="#d97706"/>
      <rect x="660" y="0" width="58" height="54" rx="6" fill="#fef3c7" stroke="#d97706"/>
      <rect x="722" y="0" width="58" height="54" rx="6" fill="#e5e7eb" stroke="#9ca3af"/>
