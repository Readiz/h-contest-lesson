<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420" role="img" aria-labelledby="title desc">
  <title id="title">크기 기준 합치기</title>
  <desc id="desc">작은 집합의 대표를 큰 집합의 대표 밑에 붙여 트리 깊이를 줄인다.</desc>
  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8.2" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
  </defs>
  <rect width="960" height="420" rx="18" fill="#ffffff"/>
  <rect x="28" y="28" width="904" height="364" rx="16" fill="#f8fafc" stroke="#dbe3ee"/>
  <g font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif">
    <text x="58" y="72" fill="#0f172a" font-size="25" font-weight="800">작은 트리를 큰 트리 밑에 붙인다</text>
    <text x="58" y="102" fill="#475569" font-size="15">대표의 size를 비교하면 긴 사슬이 생기는 일을 줄일 수 있다.</text>

    <rect x="76" y="142" width="330" height="198" rx="14" fill="#ffffff" stroke="#bfdbfe"/>
    <text x="241" y="174" text-anchor="middle" fill="#1d4ed8" font-size="18" font-weight="800">큰 집합 size = 4</text>
    <line x1="240" y1="224" x2="166" y2="272" stroke="#475569" stroke-width="3"/>
    <line x1="240" y1="224" x2="238" y2="286" stroke="#475569" stroke-width="3"/>
    <line x1="240" y1="224" x2="312" y2="272" stroke="#475569" stroke-width="3"/>
    <g font-size="16" font-weight="800" text-anchor="middle" fill="#0f172a">
      <circle cx="240" cy="214" r="25" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
      <text x="240" y="220">A</text>
      <circle cx="160" cy="286" r="23" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
      <text x="160" y="292">1</text>
      <circle cx="238" cy="304" r="23" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
      <text x="238" y="310">2</text>
      <circle cx="320" cy="286" r="23" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
      <text x="320" y="292">3</text>
    </g>

    <rect x="532" y="142" width="232" height="198" rx="14" fill="#ffffff" stroke="#bbf7d0"/>
    <text x="648" y="174" text-anchor="middle" fill="#15803d" font-size="18" font-weight="800">작은 집합 size = 2</text>
    <line x1="648" y1="230" x2="648" y2="286" stroke="#475569" stroke-width="3"/>
    <g font-size="16" font-weight="800" text-anchor="middle" fill="#0f172a">
      <circle cx="648" cy="220" r="25" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
      <text x="648" y="226">B</text>
      <circle cx="648" cy="304" r="23" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
      <text x="648" y="310">4</text>
    </g>

    <path d="M 534 238 C 484 238, 454 238, 416 238" fill="none" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow-blue)"/>
    <text x="475" y="218" text-anchor="middle" fill="#1d4ed8" font-size="14" font-weight="800">B를 A 밑으로</text>

    <rect x="782" y="190" width="104" height="74" rx="14" fill="#fef3c7" stroke="#f59e0b"/>
    <text x="834" y="220" text-anchor="middle" fill="#92400e" font-size="15" font-weight="800">결과</text>
    <text x="834" y="246" text-anchor="middle" fill="#92400e" font-size="14">size A = 6</text>
  </g>
</svg>
