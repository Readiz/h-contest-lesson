<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420" role="img" aria-labelledby="title desc">
  <title id="title">Union-Find의 핵심 연산</title>
  <desc id="desc">make set, find, union 연산이 서로소 집합을 관리하는 흐름을 보여준다.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.2" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
  </defs>
  <rect width="960" height="420" rx="18" fill="#ffffff"/>
  <rect x="28" y="28" width="904" height="364" rx="16" fill="#f8fafc" stroke="#dbe3ee"/>
  <g font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif">
    <text x="58" y="72" fill="#0f172a" font-size="25" font-weight="800">Union-Find는 집합을 합치고 대표를 찾는다</text>
    <text x="58" y="102" fill="#475569" font-size="15">각 원소는 하나의 대표를 향해 연결되고, 대표가 같으면 같은 집합이다.</text>

    <rect x="64" y="146" width="220" height="150" rx="14" fill="#ffffff" stroke="#bfdbfe"/>
    <text x="174" y="178" text-anchor="middle" fill="#1d4ed8" font-size="18" font-weight="800">make set</text>
    <g font-size="16" font-weight="800" text-anchor="middle" fill="#0f172a">
      <circle cx="114" cy="232" r="24" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
      <text x="114" y="238">0</text>
      <circle cx="174" cy="232" r="24" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
      <text x="174" y="238">1</text>
      <circle cx="234" cy="232" r="24" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
      <text x="234" y="238">2</text>
    </g>
    <text x="174" y="274" text-anchor="middle" fill="#475569" font-size="13">처음에는 모두 혼자</text>

    <path d="M 298 221 C 336 221, 354 221, 390 221" fill="none" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow)"/>

    <rect x="404" y="146" width="220" height="150" rx="14" fill="#ffffff" stroke="#bbf7d0"/>
    <text x="514" y="178" text-anchor="middle" fill="#15803d" font-size="18" font-weight="800">union</text>
    <line x1="474" y1="232" x2="554" y2="232" stroke="#475569" stroke-width="3"/>
    <g font-size="16" font-weight="800" text-anchor="middle" fill="#0f172a">
      <circle cx="474" cy="232" r="25" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
      <text x="474" y="238">0</text>
      <circle cx="554" cy="232" r="25" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
      <text x="554" y="238">1</text>
    </g>
    <text x="514" y="274" text-anchor="middle" fill="#475569" font-size="13">두 집합을 하나로</text>

    <path d="M 638 221 C 676 221, 694 221, 730 221" fill="none" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow)"/>

    <rect x="744" y="146" width="150" height="150" rx="14" fill="#ffffff" stroke="#fde68a"/>
    <text x="819" y="178" text-anchor="middle" fill="#92400e" font-size="18" font-weight="800">find</text>
    <g font-size="14" fill="#334155">
      <text x="786" y="222">find(0)</text>
      <text x="786" y="250">find(1)</text>
    </g>
    <g font-size="14" fill="#0f172a" font-weight="800">
      <text x="848" y="222">= 0</text>
      <text x="848" y="250">= 0</text>
    </g>
    <rect x="774" y="268" width="90" height="28" rx="14" fill="#fef3c7" stroke="#f59e0b"/>
    <text x="819" y="287" text-anchor="middle" fill="#92400e" font-size="13" font-weight="800">same set</text>
  </g>
</svg>
