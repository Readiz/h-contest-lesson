<svg xmlns="http://www.w3.org/2000/svg" width="920" height="340" viewBox="0 0 920 340" role="img" aria-labelledby="title desc">
  <title id="title">회의실 배정 그리디</title>
  <desc id="desc">끝나는 시간이 빠른 회의를 먼저 고르면 뒤에 남는 시간이 넓어진다는 예시</desc>
  <rect width="920" height="340" rx="18" fill="#ffffff"/>
  <rect x="28" y="28" width="864" height="284" rx="16" fill="#f8fafc" stroke="#dbe3ee"/>
  <g font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif">
    <text x="56" y="70" fill="#0f172a" font-size="24" font-weight="800">회의실 배정: 빨리 끝나는 회의부터</text>
    <text x="56" y="98" fill="#475569" font-size="15">끝나는 시간이 빠른 선택은 다음 회의를 붙일 수 있는 시간을 넓게 남긴다.</text>
    <line x1="90" y1="250" x2="830" y2="250" stroke="#94a3b8" stroke-width="2"/>
    <g fill="#64748b" font-size="12" text-anchor="middle">
      <text x="120" y="272">1</text>
      <text x="220" y="272">2</text>
      <text x="320" y="272">3</text>
      <text x="420" y="272">4</text>
      <text x="520" y="272">5</text>
      <text x="620" y="272">6</text>
      <text x="720" y="272">7</text>
      <text x="820" y="272">8</text>
    </g>
    <g stroke-width="14" stroke-linecap="round">
      <line x1="120" y1="145" x2="420" y2="145" stroke="#f97316"/>
      <line x1="150" y1="180" x2="300" y2="180" stroke="#2563eb"/>
      <line x1="320" y1="180" x2="520" y2="180" stroke="#2563eb"/>
      <line x1="540" y1="180" x2="760" y2="180" stroke="#2563eb"/>
      <line x1="440" y1="215" x2="820" y2="215" stroke="#94a3b8"/>
    </g>
    <g font-size="13" font-weight="800">
      <text x="432" y="132" fill="#c2410c">긴 회의를 먼저 고르면 뒤가 좁다</text>
      <text x="150" y="206" fill="#1d4ed8">선택</text>
      <text x="322" y="206" fill="#1d4ed8">선택</text>
      <text x="542" y="206" fill="#1d4ed8">선택</text>
    </g>
  </g>
</svg>
