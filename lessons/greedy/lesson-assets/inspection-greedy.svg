<svg xmlns="http://www.w3.org/2000/svg" width="920" height="390" viewBox="0 0 920 390" role="img" aria-labelledby="title desc">
  <title id="title">검수 예약의 마감 우선 선택</title>
  <desc id="desc">현재 처리 가능한 요청 중 마감이 빠른 요청을 먼저 처리하면 이후 선택지를 보존할 수 있다.</desc>
  <defs>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="8.2" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#16a34a"/>
    </marker>
  </defs>
  <rect width="920" height="390" rx="18" fill="#ffffff"/>
  <rect x="28" y="28" width="864" height="334" rx="16" fill="#f8fafc" stroke="#dbe3ee"/>
  <text x="64" y="56" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">현재 시각 t</text>
  <line x1="164" y1="72" x2="164" y2="300" stroke="#2563eb" stroke-width="3" stroke-dasharray="8 7"/>
  <g font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif" font-size="14" fill="#64748b">
    <text x="160" y="326" text-anchor="middle">t</text>
    <text x="290" y="326" text-anchor="middle">마감 A</text>
    <text x="560" y="326" text-anchor="middle">마감 B</text>
  </g>
  <line x1="70" y1="300" x2="840" y2="300" stroke="#cbd5e1" stroke-width="2"/>
  <line x1="290" y1="292" x2="290" y2="308" stroke="#94a3b8" stroke-width="2"/>
  <line x1="560" y1="292" x2="560" y2="308" stroke="#94a3b8" stroke-width="2"/>
  <g>
    <rect x="108" y="118" width="182" height="54" rx="12" fill="#dcfce7" stroke="#86efac"/>
    <text x="128" y="151" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif" font-size="17" font-weight="700" fill="#15803d">요청 A</text>
    <text x="222" y="151" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif" font-size="13" fill="#166534">마감 빠름</text>
    <rect x="108" y="208" width="452" height="54" rx="12" fill="#dbeafe" stroke="#93c5fd"/>
    <text x="128" y="241" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif" font-size="17" font-weight="700" fill="#1d4ed8">요청 B</text>
    <text x="222" y="241" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif" font-size="13" fill="#1e40af">마감 늦음</text>
  </g>
  <path d="M 164 94 C 205 82, 254 83, 290 100" fill="none" stroke="#16a34a" stroke-width="4" marker-end="url(#arrow-green)"/>
  <text x="442" y="116" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif" font-size="15" font-weight="700" fill="#0f172a">A를 먼저 처리</text>
  <text x="442" y="142" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif" font-size="14" fill="#475569">B는 마감이 늦으므로 더 뒤의 칸에도 들어갈 수 있다.</text>
  <rect x="612" y="195" width="220" height="86" rx="14" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="722" y="229" text-anchor="middle" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif" font-size="16" font-weight="700" fill="#0f172a">그리디 기준</text>
  <text x="722" y="256" text-anchor="middle" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif" font-size="14" fill="#475569">처리 가능한 요청 중</text>
  <text x="722" y="276" text-anchor="middle" font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif" font-size="14" fill="#475569">마감이 가장 빠른 것</text>
</svg>
