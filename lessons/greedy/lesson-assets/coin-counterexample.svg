<svg xmlns="http://www.w3.org/2000/svg" width="920" height="300" viewBox="0 0 920 300" role="img" aria-labelledby="title desc">
  <title id="title">동전 그리디 반례</title>
  <desc id="desc">동전 단위 1, 3, 4에서 6원을 만들 때 큰 동전부터 고르면 최적이 아닌 예시</desc>
  <rect width="920" height="300" rx="18" fill="#ffffff"/>
  <rect x="28" y="28" width="864" height="244" rx="16" fill="#f8fafc" stroke="#dbe3ee"/>
  <g font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif">
    <text x="56" y="72" fill="#0f172a" font-size="24" font-weight="800">반례: 큰 동전부터 고르면 항상 맞을까?</text>
    <text x="56" y="100" fill="#475569" font-size="15">동전 단위가 {1, 3, 4}이고 6원을 만들어야 한다.</text>
    <g transform="translate(70 136)">
      <rect width="330" height="94" rx="14" fill="#fff7ed" stroke="#fdba74"/>
      <text x="24" y="32" fill="#c2410c" font-size="17" font-weight="800">그리디 선택</text>
      <circle cx="84" cy="62" r="20" fill="#f97316"/>
      <text x="84" y="68" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="800">4</text>
      <circle cx="142" cy="62" r="20" fill="#f59e0b"/>
      <text x="142" y="68" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="800">1</text>
      <circle cx="200" cy="62" r="20" fill="#f59e0b"/>
      <text x="200" y="68" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="800">1</text>
      <text x="260" y="68" fill="#7c2d12" font-size="16" font-weight="800">3개</text>
    </g>
    <g transform="translate(520 136)">
      <rect width="330" height="94" rx="14" fill="#ecfdf5" stroke="#86efac"/>
      <text x="24" y="32" fill="#047857" font-size="17" font-weight="800">최적해</text>
      <circle cx="104" cy="62" r="20" fill="#10b981"/>
      <text x="104" y="68" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="800">3</text>
      <circle cx="162" cy="62" r="20" fill="#10b981"/>
      <text x="162" y="68" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="800">3</text>
      <text x="240" y="68" fill="#065f46" font-size="16" font-weight="800">2개</text>
    </g>
    <path d="M426 184 H494" stroke="#64748b" stroke-width="3" stroke-dasharray="7 7"/>
    <text x="460" y="176" text-anchor="middle" fill="#64748b" font-size="13" font-weight="700">교환 불가</text>
  </g>
</svg>
