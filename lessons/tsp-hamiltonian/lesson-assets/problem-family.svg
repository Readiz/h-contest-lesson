<svg xmlns="http://www.w3.org/2000/svg" width="920" height="360" viewBox="0 0 920 360" role="img" aria-labelledby="title desc">
  <title id="title">해밀턴 경로와 TSP의 관계</title>
  <desc id="desc">해밀턴 경로, 해밀턴 사이클, TSP 순회가 모두 모든 정점을 한 번씩 방문한다는 공통점을 보여주는 그림</desc>
  <rect width="920" height="360" fill="#f8fafc"/>
  <g font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif">
    <text x="44" y="54" fill="#0f172a" font-size="25" font-weight="800">모든 정점을 한 번씩 방문한다는 공통 조건</text>
    <text x="44" y="84" fill="#475569" font-size="15">존재 여부를 묻는 해밀턴 문제와, 비용 최적화를 묻는 TSP는 같은 상태 설계로 이어진다.</text>

    <g transform="translate(52 122)">
      <rect width="246" height="188" rx="14" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
      <text x="123" y="34" text-anchor="middle" fill="#0f172a" font-size="18" font-weight="800">해밀턴 경로</text>
      <text x="123" y="57" text-anchor="middle" fill="#64748b" font-size="13">시작과 끝이 달라도 된다</text>
      <path d="M48 136 L94 78 L145 118 L198 70" fill="none" stroke="#2563eb" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      <g fill="#ffffff" stroke="#2563eb" stroke-width="4">
        <circle cx="48" cy="136" r="13"/>
        <circle cx="94" cy="78" r="13"/>
        <circle cx="145" cy="118" r="13"/>
        <circle cx="198" cy="70" r="13"/>
      </g>
      <g fill="#1d4ed8" font-size="12" font-weight="800" text-anchor="middle">
        <text x="48" y="141">A</text>
        <text x="94" y="83">B</text>
        <text x="145" y="123">C</text>
        <text x="198" y="75">D</text>
      </g>
    </g>

    <g transform="translate(337 122)">
      <rect width="246" height="188" rx="14" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
      <text x="123" y="34" text-anchor="middle" fill="#0f172a" font-size="18" font-weight="800">해밀턴 사이클</text>
      <text x="123" y="57" text-anchor="middle" fill="#64748b" font-size="13">마지막에 시작점으로 복귀</text>
      <path d="M61 126 L92 75 L162 75 L191 126 L123 154 Z" fill="none" stroke="#16a34a" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      <g fill="#ffffff" stroke="#16a34a" stroke-width="4">
        <circle cx="61" cy="126" r="13"/>
        <circle cx="92" cy="75" r="13"/>
        <circle cx="162" cy="75" r="13"/>
        <circle cx="191" cy="126" r="13"/>
        <circle cx="123" cy="154" r="13"/>
      </g>
      <g fill="#166534" font-size="12" font-weight="800" text-anchor="middle">
        <text x="61" y="131">A</text>
        <text x="92" y="80">B</text>
        <text x="162" y="80">C</text>
        <text x="191" y="131">D</text>
        <text x="123" y="159">E</text>
      </g>
    </g>

    <g transform="translate(622 122)">
      <rect width="246" height="188" rx="14" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
      <text x="123" y="34" text-anchor="middle" fill="#0f172a" font-size="18" font-weight="800">TSP</text>
      <text x="123" y="57" text-anchor="middle" fill="#64748b" font-size="13">가능한 순회 중 비용 최소</text>
      <path d="M58 126 L95 72 L166 82 L194 134 L122 153 Z" fill="none" stroke="#dc2626" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M58 126 L166 82 M95 72 L194 134 M122 153 L166 82" fill="none" stroke="#cbd5e1" stroke-width="2"/>
      <g fill="#ffffff" stroke="#dc2626" stroke-width="4">
        <circle cx="58" cy="126" r="13"/>
        <circle cx="95" cy="72" r="13"/>
        <circle cx="166" cy="82" r="13"/>
        <circle cx="194" cy="134" r="13"/>
        <circle cx="122" cy="153" r="13"/>
      </g>
      <g fill="#991b1b" font-size="12" font-weight="800" text-anchor="middle">
        <text x="58" y="131">0</text>
        <text x="95" y="77">1</text>
        <text x="166" y="87">2</text>
        <text x="194" y="139">3</text>
        <text x="122" y="158">4</text>
      </g>
      <g fill="#475569" font-size="12" font-weight="700">
        <text x="76" y="92">8</text>
        <text x="130" y="70">4</text>
        <text x="184" y="109">7</text>
        <text x="157" y="151">6</text>
        <text x="80" y="151">5</text>
      </g>
    </g>
  </g>
</svg>
