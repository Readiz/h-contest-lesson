<svg xmlns="http://www.w3.org/2000/svg" width="920" height="360" viewBox="0 0 920 360" role="img" aria-labelledby="title desc">
  <title id="title">2-opt 지역 탐색</title>
  <desc id="desc">교차하는 두 간선을 끊고 가운데 구간을 뒤집어 더 짧은 TSP 경로로 바꾸는 2-opt 개선 과정</desc>
  <rect width="920" height="360" fill="#f8fafc"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#475569"/>
    </marker>
  </defs>
  <g font-family="Pretendard, Apple SD Gothic Neo, Arial, sans-serif">
    <text x="48" y="56" fill="#0f172a" font-size="25" font-weight="800">2-opt는 간선 두 개를 바꾸고 가운데 구간을 뒤집는다</text>
    <text x="48" y="86" fill="#475569" font-size="15">교차하거나 돌아가는 간선을 줄이면 비용이 내려갈 수 있다.</text>

    <g transform="translate(70 124)">
      <rect width="300" height="178" rx="14" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
      <text x="150" y="32" text-anchor="middle" fill="#991b1b" font-size="18" font-weight="800">Before</text>
      <path d="M52 132 L235 58 M70 58 L248 130" stroke="#dc2626" stroke-width="5" stroke-linecap="round"/>
      <path d="M52 132 L70 58 M235 58 L248 130" stroke="#94a3b8" stroke-width="3" stroke-linecap="round"/>
      <g fill="#ffffff" stroke="#0f172a" stroke-width="3">
        <circle cx="52" cy="132" r="12"/>
        <circle cx="70" cy="58" r="12"/>
        <circle cx="235" cy="58" r="12"/>
        <circle cx="248" cy="130" r="12"/>
      </g>
      <g fill="#0f172a" font-size="12" font-weight="800" text-anchor="middle">
        <text x="52" y="137">a</text>
        <text x="70" y="63">b</text>
        <text x="235" y="63">c</text>
        <text x="248" y="135">d</text>
      </g>
      <text x="150" y="162" text-anchor="middle" fill="#64748b" font-size="13">a-b, c-d 간선을 사용</text>
    </g>

    <path d="M400 213 H514" stroke="#475569" stroke-width="4" marker-end="url(#arrow)"/>
    <text x="457" y="190" text-anchor="middle" fill="#334155" font-size="15" font-weight="800">reverse(b ... c)</text>

    <g transform="translate(550 124)">
      <rect width="300" height="178" rx="14" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
      <text x="150" y="32" text-anchor="middle" fill="#166534" font-size="18" font-weight="800">After</text>
      <path d="M52 132 L235 58 M70 58 L248 130" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" stroke-dasharray="7 7"/>
      <path d="M52 132 L235 58 L70 58 L248 130" fill="none" stroke="#16a34a" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      <g fill="#ffffff" stroke="#0f172a" stroke-width="3">
        <circle cx="52" cy="132" r="12"/>
        <circle cx="70" cy="58" r="12"/>
        <circle cx="235" cy="58" r="12"/>
        <circle cx="248" cy="130" r="12"/>
      </g>
      <g fill="#0f172a" font-size="12" font-weight="800" text-anchor="middle">
        <text x="52" y="137">a</text>
        <text x="70" y="63">b</text>
        <text x="235" y="63">c</text>
        <text x="248" y="135">d</text>
      </g>
      <text x="150" y="162" text-anchor="middle" fill="#64748b" font-size="13">a-c, b-d 간선으로 교체</text>
    </g>
  </g>
</svg>
