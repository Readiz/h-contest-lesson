<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="650" viewBox="0 0 1120 650" role="img" aria-labelledby="title desc">
  <title id="title">Hungarian Algorithm potential과 tight edge 시각화</title>
  <desc id="desc">비용 행렬에서 row와 column potential을 조정해 reduced cost가 0인 tight edge를 만들고 augmenting path로 matching을 늘리는 흐름을 보여준다.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#15803d"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.4; rx: 8; }
      .title { font: 700 22px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .label { font: 700 15px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; }
      .text { font: 500 14px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; }
      .small { font: 500 12px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .mono { font: 600 14px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #1e293b; }
      .cell { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1; }
      .head { fill: #e2e8f0; stroke: #cbd5e1; stroke-width: 1; }
      .tight { fill: #dcfce7; stroke: #22c55e; stroke-width: 2; }
      .slack { fill: #dbeafe; stroke: #3b82f6; stroke-width: 2; }
      .node-left { fill: #fef3c7; stroke: #d97706; stroke-width: 2; }
      .node-right { fill: #e0f2fe; stroke: #0284c7; stroke-width: 2; }
      .edge { stroke: #94a3b8; stroke-width: 2; fill: none; }
      .match { stroke: #16a34a; stroke-width: 4; fill: none; marker-end: url(#arrow-green); }
      .augment { stroke: #2563eb; stroke-width: 4; fill: none; stroke-dasharray: 8 6; marker-end: url(#arrow); }
      .callout { fill: #fffbeb; stroke: #f59e0b; stroke-width: 1.5; rx: 8; }
      .legend { fill: #f8fafc; stroke: #dbe3ee; stroke-width: 1; rx: 6; }
    </style>
  </defs>

  <rect class="bg" width="1120" height="650"/>
  <text class="title" x="40" y="44">Hungarian: potential 조정으로 tight edge를 만들고 matching을 키운다</text>

  <rect class="panel" x="36" y="76" width="480" height="376"/>
  <text class="label" x="62" y="108">1. reduced cost 행렬</text>
  <text class="small" x="62" y="131">cost - u[row] - v[col] = 0 이면 tight edge다.</text>
  <text class="small" x="62" y="151">양수 slack은 아직 tight하지 않은 후보 간선이다.</text>

  <g transform="translate(92 180)">
    <rect class="head" x="0" y="0" width="58" height="36"/>
    <rect class="head" x="58" y="0" width="62" height="36"/>
    <rect class="head" x="120" y="0" width="62" height="36"/>
    <rect class="head" x="182" y="0" width="62" height="36"/>
    <rect class="head" x="244" y="0" width="82" height="36"/>
    <text class="mono" x="84" y="23">X</text>
    <text class="mono" x="146" y="23">Y</text>
    <text class="mono" x="208" y="23">Z</text>
    <text class="mono" x="270" y="23">u</text>

    <rect class="head" x="0" y="36" width="58" height="44"/>
    <rect class="cell" x="58" y="36" width="62" height="44"/>
    <rect class="tight" x="120" y="36" width="62" height="44"/>
    <rect class="cell" x="182" y="36" width="62" height="44"/>
    <rect class="head" x="244" y="36" width="82" height="44"/>
    <text class="mono" x="22" y="64">A</text>
    <text class="mono" x="84" y="64">3</text>
    <text class="mono" x="146" y="64">0</text>
    <text class="mono" x="208" y="64">2</text>
    <text class="mono" x="274" y="64">1</text>

    <rect class="head" x="0" y="80" width="58" height="44"/>
    <rect class="slack" x="58" y="80" width="62" height="44"/>
    <rect class="tight" x="120" y="80" width="62" height="44"/>
    <rect class="cell" x="182" y="80" width="62" height="44"/>
    <rect class="head" x="244" y="80" width="82" height="44"/>
    <text class="mono" x="22" y="108">B</text>
    <text class="mono" x="84" y="108">2</text>
    <text class="mono" x="146" y="108">0</text>
    <text class="mono" x="208" y="108">5</text>
    <text class="mono" x="274" y="108">0</text>

    <rect class="head" x="0" y="124" width="58" height="44"/>
    <rect class="cell" x="58" y="124" width="62" height="44"/>
    <rect class="tight" x="120" y="124" width="62" height="44"/>
    <rect class="tight" x="182" y="124" width="62" height="44"/>
    <rect class="head" x="244" y="124" width="82" height="44"/>
    <text class="mono" x="22" y="152">C</text>
    <text class="mono" x="84" y="152">1</text>
    <text class="mono" x="146" y="152">0</text>
    <text class="mono" x="208" y="152">0</text>
    <text class="mono" x="274" y="152">2</text>

    <rect class="head" x="0" y="168" width="58" height="36"/>
    <rect class="head" x="58" y="168" width="62" height="36"/>
    <rect class="head" x="120" y="168" width="62" height="36"/>
    <rect class="head" x="182" y="168" width="62" height="36"/>
    <rect class="head" x="244" y="168" width="82" height="36"/>
    <text class="mono" x="22" y="191">v</text>
    <text class="mono" x="84" y="191">0</text>
    <text class="mono" x="146" y="191">0</text>
    <text class="mono" x="208" y="191">0</text>
  </g>

  <g transform="translate(92 392)">
    <rect class="legend" x="0" y="0" width="360" height="52"/>
    <rect class="tight" x="12" y="8" width="18" height="18"/>
    <text class="small" x="42" y="22">tight edge: 지금 쓸 수 있는 간선</text>
    <rect class="slack" x="12" y="30" width="18" height="18"/>
    <text class="small" x="42" y="44">slack 후보: delta 조정으로 0이 될 수 있음</text>
  </g>

  <rect class="panel" x="556" y="76" width="528" height="376"/>
  <text class="label" x="582" y="108">2. tight graph에서 augmenting path 탐색</text>
  <text class="small" x="582" y="131">이미 매칭된 tight edge를 따라가다가, slack 조정으로 새 tight edge를 연다.</text>

  <g>
    <circle class="node-left" cx="640" cy="198" r="25"/>
    <circle class="node-left" cx="640" cy="278" r="25"/>
    <circle class="node-left" cx="640" cy="358" r="25"/>
    <text class="mono" x="635" y="203">A</text>
    <text class="mono" x="635" y="283">B</text>
    <text class="mono" x="635" y="363">C</text>

    <circle class="node-right" cx="988" cy="198" r="25"/>
    <circle class="node-right" cx="988" cy="278" r="25"/>
    <circle class="node-right" cx="988" cy="358" r="25"/>
    <text class="mono" x="983" y="203">X</text>
    <text class="mono" x="983" y="283">Y</text>
    <text class="mono" x="983" y="363">Z</text>

    <path class="edge" d="M665 198 C760 212 865 246 963 278"/>
    <path class="edge" d="M665 278 C760 278 865 278 963 278"/>
    <path class="edge" d="M665 358 C760 330 865 302 963 278"/>
    <path class="edge" d="M665 358 C760 358 865 358 963 358"/>

    <path class="match" d="M665 198 C760 212 865 246 963 278"/>
    <path class="match" d="M665 358 C760 358 865 358 963 358"/>
    <path class="augment" d="M665 278 C760 260 865 222 963 198"/>
  </g>

  <g transform="translate(714 164)">
    <rect class="legend" x="0" y="0" width="166" height="54"/>
    <text class="small" x="12" y="20">초록: 기존 matching</text>
    <text class="small" x="12" y="40">파랑: 새 augment 후보</text>
  </g>
  <g transform="translate(728 316)">
    <rect class="legend" x="0" y="0" width="228" height="52"/>
    <text class="small" x="12" y="20">B-X가 새 tight edge가 되면</text>
    <text class="small" x="12" y="40">A-Y, B-X, C-Z로 뒤집을 수 있다.</text>
  </g>

  <rect class="callout" x="72" y="492" width="976" height="104"/>
  <text class="label" x="102" y="524">slack 2만큼 potential 조정</text>
  <text class="text" x="102" y="552">tree에 닿은 row A,B와 아직 닿지 않은 column X,Z 사이의 최소 slack이 2라서 B-X가 reduced cost 0이 된다.</text>
  <text class="text" x="102" y="578">이 조정 뒤에는 tight edge가 하나 이상 늘어나고, 빈 column에 도달하면 matching을 뒤집어 크기를 1 키운다.</text>
</svg>
