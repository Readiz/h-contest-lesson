<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="560" viewBox="0 0 1080 560" role="img" aria-labelledby="title desc">
  <title id="title">Hungarian Algorithm alternating tree와 line cover</title>
  <desc id="desc">0 간선 그래프에서 B row에서 시작한 alternating tree가 B-Y-A에서 막히고, 그 방문 결과로 C row와 Y column에 선을 긋는 과정을 보여준다.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.4; rx: 8; }
      .title { font: 700 22px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .label { font: 700 15px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; }
      .small { font: 500 12px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .note { font: 600 13px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; }
      .mono { font: 650 14px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #1e293b; }
      .head { fill: #e2e8f0; stroke: #cbd5e1; stroke-width: 1; }
      .cell { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1; }
      .zero { fill: #dcfce7; stroke: #22c55e; stroke-width: 2; }
      .pick { fill: #bbf7d0; stroke: #15803d; stroke-width: 3; }
      .visit { fill: #dbeafe; stroke: #2563eb; stroke-width: 3; }
      .unvisited { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.5; }
      .cover { stroke: #2563eb; stroke-width: 6; opacity: 0.78; }
      .free { fill: #fef3c7; stroke: #f59e0b; stroke-width: 2; }
      .edge { stroke: #94a3b8; stroke-width: 2; fill: none; }
      .match { stroke: #15803d; stroke-width: 4; fill: none; marker-end: url(#arrow-green); }
      .tree { stroke: #2563eb; stroke-width: 4; fill: none; marker-end: url(#arrow-blue); }
      .arrow { stroke: #64748b; stroke-width: 2; fill: none; marker-end: url(#arrow-gray); }
    </style>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#15803d"/>
    </marker>
  </defs>

  <rect class="bg" width="1080" height="560"/>
  <text class="title" x="34" y="42">Alternating tree로 최소 line cover 찾기</text>

  <rect class="panel" x="34" y="74" width="306" height="404"/>
  <text class="label" x="56" y="104">1. 현재 0 matching</text>
  <text class="small" x="56" y="127">A-Y, C-Z를 골랐고 B는 남아 있다.</text>
  <g transform="translate(86 164)">
    <rect class="head" x="0" y="0" width="44" height="32"/>
    <rect class="head" x="44" y="0" width="54" height="32"/>
    <rect class="head" x="98" y="0" width="54" height="32"/>
    <rect class="head" x="152" y="0" width="54" height="32"/>
    <text class="mono" x="66" y="21">X</text>
    <text class="mono" x="120" y="21">Y</text>
    <text class="mono" x="174" y="21">Z</text>

    <rect class="head" x="0" y="32" width="44" height="38"/>
    <rect class="cell" x="44" y="32" width="54" height="38"/>
    <rect class="pick" x="98" y="32" width="54" height="38"/>
    <rect class="cell" x="152" y="32" width="54" height="38"/>
    <text class="mono" x="17" y="56">A</text><text class="mono" x="68" y="56">2</text><text class="mono" x="122" y="56">0</text><text class="mono" x="176" y="56">2</text>

    <rect class="head" x="0" y="70" width="44" height="38"/>
    <rect class="cell" x="44" y="70" width="54" height="38"/>
    <rect class="zero" x="98" y="70" width="54" height="38"/>
    <rect class="cell" x="152" y="70" width="54" height="38"/>
    <text class="mono" x="17" y="94">B</text><text class="mono" x="68" y="94">1</text><text class="mono" x="122" y="94">0</text><text class="mono" x="176" y="94">5</text>

    <rect class="head" x="0" y="108" width="44" height="38"/>
    <rect class="zero" x="44" y="108" width="54" height="38"/>
    <rect class="zero" x="98" y="108" width="54" height="38"/>
    <rect class="pick" x="152" y="108" width="54" height="38"/>
    <text class="mono" x="17" y="132">C</text><text class="mono" x="68" y="132">0</text><text class="mono" x="122" y="132">0</text><text class="mono" x="176" y="132">0</text>
  </g>
  <g transform="translate(78 348)">
    <rect class="pick" x="0" y="0" width="22" height="22"/>
    <text class="small" x="34" y="16">이미 고른 matching 0</text>
    <rect class="zero" x="0" y="34" width="22" height="22"/>
    <text class="small" x="34" y="50">아직 고르지 않은 0</text>
  </g>

  <path class="arrow" d="M354 276 H404"/>
  <rect class="panel" x="416" y="74" width="300" height="404"/>
  <text class="label" x="438" y="104">2. B에서 tree를 펼친다</text>
  <text class="small" x="438" y="127">비매칭 0 간선과 matching 간선을 번갈아 탄다.</text>
  <g>
    <circle class="visit" cx="490" cy="210" r="28"/>
    <circle class="visit" cx="632" cy="210" r="28"/>
    <circle class="visit" cx="632" cy="338" r="28"/>
    <circle class="unvisited" cx="490" cy="338" r="28"/>
    <circle class="unvisited" cx="490" cy="402" r="28"/>
    <text class="mono" x="485" y="215">B</text>
    <text class="mono" x="627" y="215">Y</text>
    <text class="mono" x="627" y="343">A</text>
    <text class="mono" x="485" y="343">C</text>
    <text class="mono" x="485" y="407">X,Z</text>

    <path class="tree" d="M518 210 H602"/>
    <text class="small" x="526" y="194">B-Y: 비매칭 0</text>
    <path class="match" d="M632 238 V308"/>
    <text class="small" x="652" y="276">A-Y: matching</text>
  </g>
  <text class="note" x="454" y="438">A에서 새 column으로 가는 0이 없어서 멈춘다.</text>

  <path class="arrow" d="M730 306 H780"/>
  <rect class="panel" x="792" y="74" width="254" height="404"/>
  <text class="label" x="814" y="104">3. 방문 결과로 선 긋기</text>
  <text class="small" x="814" y="127">방문 row: A,B / 방문 column: Y</text>
  <g transform="translate(820 166)">
    <rect class="head" x="0" y="0" width="38" height="30"/>
    <rect class="head" x="38" y="0" width="48" height="30"/>
    <rect class="head" x="86" y="0" width="48" height="30"/>
    <rect class="head" x="134" y="0" width="48" height="30"/>
    <text class="mono" x="56" y="20">X</text>
    <text class="mono" x="104" y="20">Y</text>
    <text class="mono" x="152" y="20">Z</text>

    <rect class="head" x="0" y="30" width="38" height="34"/>
    <rect class="free" x="38" y="30" width="48" height="34"/>
    <rect class="zero" x="86" y="30" width="48" height="34"/>
    <rect class="free" x="134" y="30" width="48" height="34"/>
    <text class="mono" x="14" y="52">A</text><text class="mono" x="56" y="52">2</text><text class="mono" x="104" y="52">0</text><text class="mono" x="152" y="52">2</text>

    <rect class="head" x="0" y="64" width="38" height="34"/>
    <rect class="free" x="38" y="64" width="48" height="34"/>
    <rect class="zero" x="86" y="64" width="48" height="34"/>
    <rect class="free" x="134" y="64" width="48" height="34"/>
    <text class="mono" x="14" y="86">B</text><text class="mono" x="56" y="86">1</text><text class="mono" x="104" y="86">0</text><text class="mono" x="152" y="86">5</text>

    <rect class="head" x="0" y="98" width="38" height="34"/>
    <rect class="zero" x="38" y="98" width="48" height="34"/>
    <rect class="zero" x="86" y="98" width="48" height="34"/>
    <rect class="zero" x="134" y="98" width="48" height="34"/>
    <text class="mono" x="14" y="120">C</text><text class="mono" x="56" y="120">0</text><text class="mono" x="104" y="120">0</text><text class="mono" x="152" y="120">0</text>

    <line class="cover" x1="110" y1="28" x2="110" y2="134"/>
    <line class="cover" x1="0" y1="115" x2="184" y2="115"/>
  </g>
  <text class="small" x="820" y="326">선: 표시되지 않은 C row + 표시된 Y column</text>
  <text class="small" x="820" y="350">노란 칸에서 delta = 1을 고른다.</text>
</svg>
