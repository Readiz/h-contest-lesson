<svg xmlns="http://www.w3.org/2000/svg" width="1160" height="760" viewBox="0 0 1160 760" role="img" aria-labelledby="title desc">
  <title id="title">Hungarian Algorithm 손계산 trace</title>
  <desc id="desc">3x3 비용 행렬에서 row reduction, column reduction, minimum line cover, uncovered minimum adjustment를 거쳐 독립적인 0 세 개를 찾는 과정을 보여준다.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.4; rx: 8; }
      .title { font: 700 22px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .label { font: 700 15px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; }
      .small { font: 500 12px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .note { font: 600 13px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; }
      .mono { font: 650 14px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #1e293b; }
      .head { fill: #e2e8f0; stroke: #cbd5e1; stroke-width: 1; }
      .cell { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1; }
      .zero { fill: #dcfce7; stroke: #22c55e; stroke-width: 2; }
      .pick { fill: #bbf7d0; stroke: #15803d; stroke-width: 3; }
      .line { stroke: #2563eb; stroke-width: 5; opacity: 0.74; }
      .adjust { fill: #fef3c7; stroke: #f59e0b; stroke-width: 2; }
      .arrow { stroke: #64748b; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>

  <rect class="bg" width="1160" height="760"/>
  <text class="title" x="36" y="44">손으로 푸는 Hungarian trace: 0을 만들고 독립적인 0을 고른다</text>

  <rect class="panel" x="36" y="76" width="320" height="238"/>
  <text class="label" x="58" y="104">1. 원래 비용</text>
  <text class="small" x="58" y="127">각 row와 column에서 하나씩 선택한다.</text>
  <g transform="translate(102 144)">
    <rect class="head" x="0" y="0" width="44" height="32"/>
    <rect class="head" x="44" y="0" width="54" height="32"/>
    <rect class="head" x="98" y="0" width="54" height="32"/>
    <rect class="head" x="152" y="0" width="54" height="32"/>
    <text class="mono" x="66" y="21">X</text>
    <text class="mono" x="120" y="21">Y</text>
    <text class="mono" x="174" y="21">Z</text>

    <rect class="head" x="0" y="32" width="44" height="38"/>
    <rect class="cell" x="44" y="32" width="54" height="38"/>
    <rect class="cell" x="98" y="32" width="54" height="38"/>
    <rect class="cell" x="152" y="32" width="54" height="38"/>
    <text class="mono" x="17" y="56">A</text><text class="mono" x="68" y="56">4</text><text class="mono" x="122" y="56">1</text><text class="mono" x="176" y="56">3</text>

    <rect class="head" x="0" y="70" width="44" height="38"/>
    <rect class="cell" x="44" y="70" width="54" height="38"/>
    <rect class="cell" x="98" y="70" width="54" height="38"/>
    <rect class="cell" x="152" y="70" width="54" height="38"/>
    <text class="mono" x="17" y="94">B</text><text class="mono" x="68" y="94">2</text><text class="mono" x="122" y="94">0</text><text class="mono" x="176" y="94">5</text>

    <rect class="head" x="0" y="108" width="44" height="38"/>
    <rect class="cell" x="44" y="108" width="54" height="38"/>
    <rect class="cell" x="98" y="108" width="54" height="38"/>
    <rect class="cell" x="152" y="108" width="54" height="38"/>
    <text class="mono" x="17" y="132">C</text><text class="mono" x="68" y="132">3</text><text class="mono" x="122" y="132">2</text><text class="mono" x="176" y="132">2</text>
  </g>

  <path class="arrow" d="M368 194 H410"/>
  <rect class="panel" x="420" y="76" width="352" height="238"/>
  <text class="label" x="442" y="104">2. row, column 최솟값 빼기</text>
  <text class="small" x="442" y="127">0인 칸만 tight edge 후보로 본다</text>
  <g transform="translate(494 138)">
    <rect class="head" x="0" y="0" width="44" height="32"/>
    <rect class="head" x="44" y="0" width="54" height="32"/>
    <rect class="head" x="98" y="0" width="54" height="32"/>
    <rect class="head" x="152" y="0" width="54" height="32"/>
    <text class="mono" x="66" y="21">X</text>
    <text class="mono" x="120" y="21">Y</text>
    <text class="mono" x="174" y="21">Z</text>

    <rect class="head" x="0" y="32" width="44" height="38"/>
    <rect class="cell" x="44" y="32" width="54" height="38"/>
    <rect class="zero" x="98" y="32" width="54" height="38"/>
    <rect class="cell" x="152" y="32" width="54" height="38"/>
    <text class="mono" x="17" y="56">A</text><text class="mono" x="68" y="56">2</text><text class="mono" x="122" y="56">0</text><text class="mono" x="176" y="56">2</text>

    <rect class="head" x="0" y="70" width="44" height="38"/>
    <rect class="cell" x="44" y="70" width="54" height="38"/>
    <rect class="zero" x="98" y="70" width="54" height="38"/>
    <rect class="cell" x="152" y="70" width="54" height="38"/>
    <text class="mono" x="17" y="94">B</text><text class="mono" x="68" y="94">1</text><text class="mono" x="122" y="94">0</text><text class="mono" x="176" y="94">5</text>

    <rect class="head" x="0" y="108" width="44" height="38"/>
    <rect class="zero" x="44" y="108" width="54" height="38"/>
    <rect class="zero" x="98" y="108" width="54" height="38"/>
    <rect class="zero" x="152" y="108" width="54" height="38"/>
    <text class="mono" x="17" y="132">C</text><text class="mono" x="68" y="132">0</text><text class="mono" x="122" y="132">0</text><text class="mono" x="176" y="132">0</text>

    <line class="line" x1="125" y1="30" x2="125" y2="148"/>
    <line class="line" x1="0" y1="127" x2="208" y2="127"/>
  </g>
  <text class="small" x="442" y="298">Y column과 C row, 총 2개의 선으로 모든 0을 덮는다.</text>

  <path class="arrow" d="M784 194 H826"/>
  <rect class="panel" x="836" y="76" width="288" height="238"/>
  <text class="label" x="858" y="104">3. uncovered 최솟값 조정</text>
  <text class="small" x="858" y="127">덮이지 않은 칸의 최솟값은 1</text>
  <rect class="adjust" x="862" y="152" width="230" height="46"/>
  <text class="note" x="878" y="172">uncovered 칸에서 1을 뺀다</text>
  <text class="small" x="878" y="190">A-X, A-Z, B-X, B-Z</text>
  <rect class="adjust" x="862" y="212" width="230" height="46"/>
  <text class="note" x="878" y="232">두 선의 교차점에는 1을 더한다</text>
  <text class="small" x="878" y="250">C-Y만 double covered</text>
  <text class="small" x="858" y="292">새 0 B-X가 생겨 matching 후보가 늘어난다.</text>

  <rect class="panel" x="118" y="368" width="924" height="308"/>
  <text class="label" x="146" y="400">4. 조정 후 독립적인 0 세 개 선택</text>
  <text class="small" x="146" y="426">A-Y, B-X, C-Z는 row와 column이 모두 다르므로 완전 assignment다.</text>
  <text class="small" x="146" y="450">원래 비용으로 계산하면 1 + 2 + 2 = 5.</text>

  <g transform="translate(626 430)">
    <rect class="head" x="0" y="0" width="48" height="34"/>
    <rect class="head" x="48" y="0" width="62" height="34"/>
    <rect class="head" x="110" y="0" width="62" height="34"/>
    <rect class="head" x="172" y="0" width="62" height="34"/>
    <text class="mono" x="72" y="22">X</text>
    <text class="mono" x="134" y="22">Y</text>
    <text class="mono" x="196" y="22">Z</text>

    <rect class="head" x="0" y="34" width="48" height="44"/>
    <rect class="cell" x="48" y="34" width="62" height="44"/>
    <rect class="pick" x="110" y="34" width="62" height="44"/>
    <rect class="cell" x="172" y="34" width="62" height="44"/>
    <text class="mono" x="18" y="62">A</text><text class="mono" x="74" y="62">1</text><text class="mono" x="136" y="62">0</text><text class="mono" x="198" y="62">1</text>

    <rect class="head" x="0" y="78" width="48" height="44"/>
    <rect class="pick" x="48" y="78" width="62" height="44"/>
    <rect class="zero" x="110" y="78" width="62" height="44"/>
    <rect class="cell" x="172" y="78" width="62" height="44"/>
    <text class="mono" x="18" y="106">B</text><text class="mono" x="74" y="106">0</text><text class="mono" x="136" y="106">0</text><text class="mono" x="198" y="106">4</text>

    <rect class="head" x="0" y="122" width="48" height="44"/>
    <rect class="zero" x="48" y="122" width="62" height="44"/>
    <rect class="cell" x="110" y="122" width="62" height="44"/>
    <rect class="pick" x="172" y="122" width="62" height="44"/>
    <text class="mono" x="18" y="150">C</text><text class="mono" x="74" y="150">0</text><text class="mono" x="136" y="150">1</text><text class="mono" x="198" y="150">0</text>
  </g>

  <g transform="translate(164 494)">
    <rect class="zero" x="0" y="0" width="22" height="22"/>
    <text class="small" x="34" y="16">0인 칸: tight edge 후보</text>
    <rect class="pick" x="0" y="38" width="22" height="22"/>
    <text class="small" x="34" y="54">선택한 0: matching edge</text>
    <line class="line" x1="2" y1="86" x2="72" y2="86"/>
    <text class="small" x="86" y="90">0을 덮는 최소 선</text>
    <rect class="adjust" x="0" y="110" width="22" height="22"/>
    <text class="small" x="34" y="126">delta 조정 대상</text>
  </g>
</svg>
